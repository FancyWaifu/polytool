<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyLens</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">P</div>
            <h1>PolyLens <span>v2.0</span></h1>
        </div>
        <div class="header-actions">
            <div class="status-dot"></div>
            <span class="status-text">Live</span>
        </div>
    </header>

    <nav>
        <button data-tab="devices" class="active" onclick="switchTab('devices')">Devices</button>
        <button data-tab="updates" onclick="switchTab('updates')">Firmware Updates</button>
        <button data-tab="catalog" onclick="switchTab('catalog')">Catalog</button>
    </nav>

    <main>
        <div class="loading">
            <div class="spinner"></div> Loading...
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
